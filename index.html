const techKeywords = ['OpenClaw', 'AI NEWS', 'Agentic'];
const isTech = v => techKeywords.some(k => v.title.includes(k));

const books = VIDEOS.filter(v => !isTech(v));
const tech = VIDEOS.filter(v => isTech(v));

// Categories for books
const categories = {
  '全部': () => true,
  '哲学思想': v => /道德经|论自由|康德|苏菲|社会契约|有限与无限|悉达多|佛学/.test(v.title),
  '心理认知': v => /思考.*快|刻意练习|思维的囚徒|捉弄|好奇心|认知|大脑|不安的哲学|随他们去/.test(v.title),
  '财富商业': v => /财富|穷查理|伯克希尔|巴菲特|低利率|一如既往|稻盛|管理者/.test(v.title),
  '历史人文': v => /人类简史|未来简史|智人|枪炮|帝国|史记|五代|儒学|文化|东京|社会契约|菊与刀|繁荣与停滞/.test(v.title),
  '自我提升': v => /如何找到|出类拔萃|能力陷阱|反脆弱|穿越风暴|被讨厌|幸福的勇气|第三个千年/.test(v.title),
  '文学传记': v => /月亮|面纱|罗生门|乔布斯|爱因斯坦|达芬奇|比尔盖茨|坂本|厌女|年轻人的国文|岳飞|黑塞|年轻人.*冷酷|eurotrash|paradise|strange.*death|解惑|世界观|机械宇宙/.test(v.title),
  '合集推荐': v => /3本书|三部曲|三板斧|三重密码|方法论/.test(v.title),
};

// Stats
document.getElementById('stats').innerHTML = `
  <div class="stat-item"><div class="stat-num">${books.length}</div><div class="stat-label">书 籍 解 读</div></div>
  <div class="stat-item"><div class="stat-num">${tech.length}</div><div class="stat-label">A I 教 程</div></div>
  <div class="stat-item"><div class="stat-num">${VIDEOS.length}</div><div class="stat-label">视 频 总 数</div></div>
`;

function renderCards(container, videos) {
  container.innerHTML = videos.map((v, i) => `
    <a class="video-card reveal" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener" style="transition-delay: ${Math.min(i * 0.05, 0.6)}s">
      <div class="video-thumb">
        <img src="${v.thumbnail}" alt="${v.title.replace(/"/g, '&quot;')}" loading="lazy">
        <div class="play-overlay"><div class="play-icon"></div></div>
      </div>
      <div class="video-info">
        <div class="video-title">${v.title.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        <div class="video-meta">
          <span class="video-date">${v.published}</span>
          <span class="video-views">${v.views}</span>
        </div>
      </div>
    </a>
  `).join('');
  observeReveal();
}

// Book filters
const filterBar = document.getElementById('bookFilters');
Object.keys(categories).forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (i === 0 ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = books.filter(categories[cat]);
    renderCards(document.getElementById('bookGrid'), filtered);
  };
  filterBar.appendChild(btn);
});

renderCards(document.getElementById('bookGrid'), books);
renderCards(document.getElementById('techGrid'), tech);

// Scroll reveal
function observeReveal() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => obs.observe(el));
}
observeReveal();
</script>
